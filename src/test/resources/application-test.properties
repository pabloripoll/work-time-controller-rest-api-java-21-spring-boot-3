# Environment — loads .env for the test profile
spring.config.import=optional:file:.env.test[.properties]

# --- Test profile ---
# DB connection comes from .env.test (same keys, different DB_NAME)

# Run migrations on test DB
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.contexts=test

# More verbose SQL in tests
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG

# --- JWT ---
jwt.secret=${JWT_SECRET}
jwt.ttl=${JWT_TTL:3600}

# add this line temporarily to see what got resolved
logging.level.org.springframework.boot.context.config=DEBUG