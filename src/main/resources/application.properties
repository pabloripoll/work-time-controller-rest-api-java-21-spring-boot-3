# Environment — loads .env for the development profile
spring.config.import=optional:file:.env[.properties]

# --- Dev --- #
server.port=${SERVER_PORT:8081}

# --- DataSource settings ---
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA/Hibernate settings ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Remove explicit dialect so Spring Boot / Hibernate auto-selects the correct dialect:
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Thymeleaf --- Hibernate session stays open during the rendering of a web view for statements
spring.jpa.open-in-view=false

# --- Liquibase settings --- This whole block can be removed after platform installation
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.contexts=development
#spring.jpa.hibernate.ddl-auto=none
#spring.datasource.initialization-mode=never
#spring.datasource.url=jdbc:h2:mem:testdb

# --- Logging - set logging level ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.liquibase=DEBUG

# --- DevTools: disable automatic restart to avoid double-start / Liquibase race in dev ---
spring.devtools.restart.enabled=false

# --- API output normalization ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC
spring.jackson.property-naming-strategy=SNAKE_CASE

# --- API errors ---
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# --- JWT ---
jwt.secret=${JWT_SECRET}
jwt.ttl=${JWT_TTL:3600}

# --- External Services ---

# --- File Storage
avatar.storage=${AVATAR_STORAGE:local}
avatar.local-path=${AVATAR_LOCAL_PATH:./src/main/resources/static/files/images/avatars}
avatar.base-url=${AVATAR_BASE_URL:http://localhost:8080/files/images/avatars}

# --- Mail (adjust port to your Mailhog SMTP port if different) ---
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
# Optional: a default from address (if your mail sender needs it)
spring.mail.default-encoding=UTF-8

# --- RabbitMQ ---
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
# If you need username/password:
# spring.rabbitmq.username=guest
# spring.rabbitmq.password=guest